<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 900" fill="none">
  <!-- Main Street, U.S.A. — LEFT row. Hugs the left edge and steps DOWN toward the
       center, so the castle shows in the gap. Keep the right ~third transparent.
       Placeholder — replace, keep the anim-lamp group so the gas lamps flicker. -->
  <!-- facade silhouette (tall at the edge, receding toward the castle) -->
  <path d="M0 900 L0 175 L120 150 L120 300 L210 300 L210 470 L260 470 L260 900 Z" fill="#efe1c8"/>
  <!-- shaded right-hand faces give a hint of perspective -->
  <g fill="#dcc9a6">
    <rect x="108" y="300" width="14" height="600"/>
    <rect x="198" y="470" width="14" height="430"/>
  </g>
  <!-- cornices / roof bands -->
  <g fill="#c0543f">
    <rect x="-4" y="150" width="128" height="26"/>
    <rect x="110" y="300" width="104" height="22"/>
    <rect x="200" y="470" width="64" height="20"/>
  </g>
  <!-- the tall building's teal peaked roof -->
  <path d="M-4 150 L60 96 L124 150 Z" fill="#3f8d86"/>
  <!-- warm windows -->
  <g fill="#ffdf9e">
    <rect x="20" y="206" width="34" height="50" rx="9"/><rect x="70" y="206" width="34" height="50" rx="9"/>
    <rect x="20" y="300" width="34" height="50" rx="9"/><rect x="70" y="300" width="34" height="50" rx="9"/>
    <rect x="20" y="394" width="34" height="50" rx="9"/><rect x="70" y="394" width="34" height="50" rx="9"/>
    <rect x="134" y="350" width="30" height="46" rx="9"/><rect x="172" y="350" width="30" height="46" rx="9"/>
    <rect x="134" y="430" width="30" height="46" rx="9"/><rect x="172" y="430" width="30" height="46" rx="9"/>
    <rect x="220" y="520" width="28" height="44" rx="9"/>
  </g>
  <!-- doorways -->
  <g fill="#9a6b3f">
    <rect x="32" y="760" width="58" height="140" rx="12"/>
    <rect x="138" y="784" width="50" height="116" rx="12"/>
  </g>
  <!-- gas lamps -->
  <g id="anim-lamp" fill="#ffcf6b">
    <circle cx="248" cy="640" r="9"/><circle cx="120" cy="612" r="9"/><circle cx="20" cy="560" r="9"/>
  </g>
</svg>
